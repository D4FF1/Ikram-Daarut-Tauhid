
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login User - IKRAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/user-auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card" data-testid="user-login-card">
            <div class="auth-header">
                <a href="index.html" class="auth-back"><i class="fas fa-arrow-left"></i></a>
                <h1>Selamat Datang</h1>
                <p>Masuk untuk mendaftar event IKRAM</p>
            </div>

            <form id="loginForm" class="auth-form" data-testid="user-login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="email@contoh.com" required data-testid="login-email-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Masukkan password" required data-testid="login-password-input">
                    </div>
                </div>

                <button type="submit" class="btn-auth" data-testid="login-submit-button">
                    <span class="btn-text">Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <p class="auth-alt">
                    Belum punya akun? <a href="register.html" data-testid="goto-register-link">Daftar sekarang</a>
                </p>
                <p class="auth-alt">
                    <a href="event.html"><i class="fas fa-calendar-alt"></i> Lihat event tanpa login</a>
                </p>
            </form>

            <div id="alertBox" class="auth-alert" data-testid="login-alert" style="display:none;"></div>
        </div>
    </div>

    <script src="assets/js/user-auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append('action', 'login');
            const res = await fetch('api/user_auth.php', { method: 'POST', body: fd, credentials: 'include' });
            const data = await res.json();
            const alertBox = document.getElementById('alertBox');
            if (data.success) {
                alertBox.className = 'auth-alert success';
                alertBox.textContent = 'Login berhasil! Mengarahkan...';
                alertBox.style.display = 'block';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            } else {
                alertBox.className = 'auth-alert error';
                alertBox.textContent = data.message;
                alertBox.style.display = 'block';
            }
        });
    </script>

</body>
</html>
