
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Saya - IKRAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/user-auth.css">
</head>
<body class="dashboard-body">
    <nav class="dash-nav">
        <div class="dash-nav-inner">
            <a href="index.html" class="dash-brand">
                <span style="color:#4A6D2C;font-weight:800;">IKRAM</span> · Dashboard
            </a>
            <div class="dash-nav-links">
                <a href="event.html"><i class="fas fa-calendar-alt"></i> Jelajah Event</a>
                <button id="notifBtn" class="notif-btn" data-testid="notif-btn" aria-label="Notifikasi">
                    <i class="fas fa-bell"></i>
                    <span id="notifBadge" class="notif-badge" data-testid="notif-badge" style="display:none;">0</span>
                </button>
                <button id="profileBtn" class="profile-btn" data-testid="profile-btn" title="Edit Profil"><i class="fas fa-user-cog"></i></button>
                <span class="dash-user" id="dashUserName" data-testid="dash-username">—</span>
                <button id="logoutBtn" class="btn-logout-dash" data-testid="logout-button"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        <div id="notifDropdown" class="notif-dropdown" data-testid="notif-dropdown" style="display:none;">
            <div class="notif-head">
                <strong>Notifikasi</strong>
                <button id="markAllReadBtn" class="link-btn" data-testid="mark-all-read">Tandai semua dibaca</button>
            </div>
            <div id="notifList" class="notif-list"></div>
        </div>
    </nav>

    <main class="dash-main">
        <header class="dash-header" data-testid="dashboard-header">
            <h1>Halo, <span id="welcomeName">User</span> 👋</h1>
            <p>Berikut status pendaftaran event kamu</p>
        </header>

        <section class="dash-stats" data-testid="dashboard-stats">
            <div class="stat-card stat-pending">
                <i class="fas fa-clock"></i>
                <div>
                    <div class="stat-num" id="statPending" data-testid="stat-pending">0</div>
                    <div class="stat-label">Menunggu Review</div>
                </div>
            </div>
            <div class="stat-card stat-approved">
                <i class="fas fa-check-circle"></i>
                <div>
                    <div class="stat-num" id="statApproved" data-testid="stat-approved">0</div>
                    <div class="stat-label">Diterima</div>
                </div>
            </div>
            <div class="stat-card stat-rejected">
                <i class="fas fa-times-circle"></i>
                <div>
                    <div class="stat-num" id="statRejected" data-testid="stat-rejected">0</div>
                    <div class="stat-label">Ditolak</div>
                </div>
            </div>
        </section>

        <section class="dash-section">
            <div class="dash-section-head">
                <h2><i class="fas fa-clipboard-list"></i> Pendaftaran Event Saya</h2>
                <div class="dash-filters">
                    <button class="dash-filter active" data-status="all" data-testid="filter-all">Semua</button>
                    <button class="dash-filter" data-status="pending" data-testid="filter-pending">Pending</button>
                    <button class="dash-filter" data-status="approved" data-testid="filter-approved">Diterima</button>
                    <button class="dash-filter" data-status="rejected" data-testid="filter-rejected">Ditolak</button>
                </div>
            </div>

            <div id="regList" class="reg-list" data-testid="registrations-list">
                <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Memuat data...</div>
            </div>
        </section>
    </main>

    <!-- Modal Edit Profil -->
    <div id="profileModal" class="profile-modal" data-testid="profile-modal" style="display:none;">
        <div class="profile-modal-card">
            <div class="profile-modal-head">
                <h2><i class="fas fa-user-cog"></i> Edit Profil</h2>
                <button type="button" id="closeProfileBtn" class="modal-close-btn" data-testid="close-profile-modal">&times;</button>
            </div>
            <form id="profileForm" class="auth-form" data-testid="profile-form">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" name="nama" id="pf_nama" required data-testid="pf-nama">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email <small>(tidak bisa diubah)</small></label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="pf_email" disabled data-testid="pf-email">
                    </div>
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>No HP / WhatsApp</label>
                        <div class="input-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" name="no_hp" id="pf_no_hp" required data-testid="pf-nohp">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Asal Institusi</label>
                        <div class="input-icon">
                            <i class="fas fa-school"></i>
                            <input type="text" name="asal_institusi" id="pf_inst" data-testid="pf-institusi">
                        </div>
                    </div>
                </div>
                <hr style="border:none;border-top:1px dashed #ddd;margin:18px 0;">
                <p style="font-size:.85rem;color:#888;margin:0 0 12px;">Kosongkan field di bawah jika tidak ingin ganti password</p>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Password Lama</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="current_password" id="pf_curpass" placeholder="Password sekarang" data-testid="pf-curpass">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password Baru</label>
                        <div class="input-icon">
                            <i class="fas fa-key"></i>
                            <input type="password" name="new_password" id="pf_newpass" placeholder="Min 6 karakter" minlength="6" data-testid="pf-newpass">
                        </div>
                    </div>
                </div>
                <div id="pfAlert" class="auth-alert" data-testid="pf-alert" style="display:none;"></div>
                <button type="submit" class="btn-auth" data-testid="pf-submit"><span class="btn-text">Simpan Perubahan</span> <i class="fas fa-check"></i></button>
            </form>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let allRegs = [];

        async function checkSession() {
            const res = await fetch('api/user_auth.php?action=me', { credentials: 'include' });
            const data = await res.json();
            if (!data.success) { window.location.href = 'login.html'; return null; }
            return data.data;
        }

        async function loadRegs() {
            const res = await fetch('api/registrations.php?action=mine', { credentials: 'include' });
            const data = await res.json();
            if (!data.success) { renderList([]); return; }
            allRegs = data.data || [];
            updateStats();
            renderList(allRegs);
        }

        function updateStats() {
            document.getElementById('statPending').textContent = allRegs.filter(r => r.status === 'pending').length;
            document.getElementById('statApproved').textContent = allRegs.filter(r => r.status === 'approved').length;
            document.getElementById('statRejected').textContent = allRegs.filter(r => r.status === 'rejected').length;
        }

        function renderList(regs) {
            const list = document.getElementById('regList');
            const filtered = currentFilter === 'all' ? regs : regs.filter(r => r.status === currentFilter);
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state" data-testid="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>Belum ada pendaftaran${currentFilter !== 'all' ? ' dengan status ini' : ''}</p>
                    <a href="event.html" class="btn-explore" data-testid="explore-events-link">Jelajahi Event</a>
                </div>`;
                return;
            }
            list.innerHTML = filtered.map(r => {
                const statusMap = {
                    pending: { label: 'Menunggu Review', icon: 'fa-hourglass-half', cls: 'badge-pending' },
                    approved: { label: 'Diterima ✓', icon: 'fa-check-circle', cls: 'badge-approved' },
                    rejected: { label: 'Ditolak', icon: 'fa-times-circle', cls: 'badge-rejected' }
                }[r.status] || { label: r.status, icon: 'fa-question', cls: 'badge-pending' };
                const tgl = r.tanggal ? new Date(r.tanggal + 'T00:00:00').toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}) : '-';
                const poster = r.poster ? `<img src="${r.poster}" alt="poster" class="reg-poster">` : `<div class="reg-poster reg-poster-ph"><i class="fas fa-image"></i></div>`;
                return `
                <div class="reg-card" data-status="${r.status}" data-testid="reg-card-${r.id}">
                    ${poster}
                    <div class="reg-body">
                        <div class="reg-top">
                            <h3>${r.event_judul || 'Event'}</h3>
                            <span class="reg-status ${statusMap.cls}" data-testid="reg-status-${r.id}"><i class="fas ${statusMap.icon}"></i> ${statusMap.label}</span>
                        </div>
                        <div class="reg-meta">
                            <span><i class="fas fa-calendar-day"></i> ${tgl}</span>
                            <span><i class="fas fa-clock"></i> ${r.waktu || '-'}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${r.lokasi || '-'}</span>
                            ${r.kategori ? `<span class="reg-kategori">${r.kategori}</span>` : ''}
                        </div>
                        ${r.alasan_mendaftar ? `<p class="reg-alasan"><b>Alasan:</b> ${r.alasan_mendaftar}</p>` : ''}
                        <small class="reg-tgl">Didaftarkan: ${new Date(r.created_at).toLocaleString('id-ID')}</small>
                    </div>
                </div>`;
            }).join('');
        }

        document.querySelectorAll('.dash-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.dash-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.status;
                renderList(allRegs);
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const fd = new FormData();
            fd.append('action', 'logout');
            await fetch('api/user_auth.php', { method: 'POST', body: fd, credentials: 'include' });
            window.location.href = 'login.html';
        });

        (async () => {
            const me = await checkSession();
            if (me) {
                document.getElementById('dashUserName').textContent = me.nama;
                document.getElementById('welcomeName').textContent = me.nama;
                document.getElementById('pf_nama').value = me.nama || '';
                document.getElementById('pf_email').value = me.email || '';
                document.getElementById('pf_no_hp').value = me.no_hp || '';
                document.getElementById('pf_inst').value = me.asal_institusi || '';
                loadRegs();
                loadNotifications();
                setInterval(loadNotifications, 30000); // polling tiap 30 detik
            }
        })();

        // ===== Notifications =====
        async function loadNotifications() {
            try {
                const res = await fetch('api/notifications.php', { credentials: 'include' });
                const data = await res.json();
                if (!data.success) return;
                const { items, unread } = data.data;
                const badge = document.getElementById('notifBadge');
                badge.textContent = unread;
                badge.style.display = unread > 0 ? 'inline-flex' : 'none';
                const list = document.getElementById('notifList');
                if (!items.length) {
                    list.innerHTML = '<div class="notif-empty">Belum ada notifikasi</div>';
                    return;
                }
                list.innerHTML = items.map(n => {
                    const icon = n.type === 'success' ? 'fa-check-circle' : (n.type === 'rejected' ? 'fa-times-circle' : 'fa-info-circle');
                    const cls = n.is_read == 0 ? 'unread' : '';
                    return `<div class="notif-item ${cls}" data-id="${n.id}" data-testid="notif-item-${n.id}">
                        <i class="fas ${icon} notif-icon notif-${n.type}"></i>
                        <div class="notif-body">
                            <strong>${n.title}</strong>
                            <p>${n.message}</p>
                            <small>${new Date(n.created_at).toLocaleString('id-ID')}</small>
                        </div>
                    </div>`;
                }).join('');
                // Bind mark-as-read on click
                list.querySelectorAll('.notif-item.unread').forEach(el => {
                    el.addEventListener('click', async () => {
                        const fd = new FormData();
                        fd.append('action', 'mark_read');
                        fd.append('id', el.dataset.id);
                        await fetch('api/notifications.php', { method:'POST', body:fd, credentials:'include' });
                        loadNotifications();
                    });
                });
            } catch (e) { /* silent */ }
        }

        document.getElementById('notifBtn').addEventListener('click', e => {
            e.stopPropagation();
            const dd = document.getElementById('notifDropdown');
            dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', e => {
            const dd = document.getElementById('notifDropdown');
            if (dd && !dd.contains(e.target) && !document.getElementById('notifBtn').contains(e.target)) {
                dd.style.display = 'none';
            }
        });
        document.getElementById('markAllReadBtn').addEventListener('click', async () => {
            const fd = new FormData(); fd.append('action', 'mark_all_read');
            await fetch('api/notifications.php', { method:'POST', body:fd, credentials:'include' });
            loadNotifications();
        });

        // ===== Profile Modal =====
        const profileModal = document.getElementById('profileModal');
        document.getElementById('profileBtn').addEventListener('click', () => profileModal.style.display = 'flex');
        document.getElementById('closeProfileBtn').addEventListener('click', () => profileModal.style.display = 'none');
        profileModal.addEventListener('click', e => { if (e.target === profileModal) profileModal.style.display = 'none'; });

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append('action', 'update_profile');
            const res = await fetch('api/user_auth.php', { method: 'POST', body: fd, credentials: 'include' });
            const data = await res.json();
            const alertEl = document.getElementById('pfAlert');
            alertEl.style.display = 'block';
            if (data.success) {
                alertEl.className = 'auth-alert success';
                alertEl.textContent = 'Profil berhasil diperbarui';
                document.getElementById('dashUserName').textContent = data.data.nama;
                document.getElementById('welcomeName').textContent = data.data.nama;
                document.getElementById('pf_curpass').value = '';
                document.getElementById('pf_newpass').value = '';
                setTimeout(() => { profileModal.style.display = 'none'; alertEl.style.display = 'none'; }, 1500);
            } else {
                alertEl.className = 'auth-alert error';
                alertEl.textContent = data.message;
            }
        });
    </script>

</body>
</html>
