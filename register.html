
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - IKRAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/user-auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card auth-card-wide" data-testid="user-register-card">
            <div class="auth-header">
                <a href="index.html" class="auth-back"><i class="fas fa-arrow-left"></i></a>
                <h1>Buat Akun Baru</h1>
                <p>Daftar untuk bisa join event IKRAM</p>
            </div>

            <form id="registerForm" class="auth-form" data-testid="user-register-form">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="nama" name="nama" placeholder="Nama lengkap kamu" required data-testid="register-name-input">
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="email@contoh.com" required data-testid="register-email-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="no_hp">No HP / WhatsApp</label>
                        <div class="input-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="no_hp" name="no_hp" placeholder="08xxxxxxxxxx" required data-testid="register-phone-input">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="asal_institusi">Asal Institusi <span class="optional">(opsional)</span></label>
                    <div class="input-icon">
                        <i class="fas fa-school"></i>
                        <input type="text" id="asal_institusi" name="asal_institusi" placeholder="Sekolah / Universitas / Perusahaan" data-testid="register-institusi-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password <small>(min 6 karakter)</small></label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Buat password" required minlength="6" data-testid="register-password-input">
                    </div>
                </div>

                <button type="submit" class="btn-auth" data-testid="register-submit-button">
                    <span class="btn-text">Daftar Sekarang</span>
                    <i class="fas fa-user-plus"></i>
                </button>

                <p class="auth-alt">
                    Sudah punya akun? <a href="login.html" data-testid="goto-login-link">Login di sini</a>
                </p>
            </form>

            <div id="alertBox" class="auth-alert" data-testid="register-alert" style="display:none;"></div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append('action', 'register');
            const res = await fetch('api/user_auth.php', { method: 'POST', body: fd, credentials: 'include' });
            const data = await res.json();
            const alertBox = document.getElementById('alertBox');
            if (data.success) {
                alertBox.className = 'auth-alert success';
                alertBox.textContent = 'Pendaftaran berhasil! Mengarahkan ke dashboard...';
                alertBox.style.display = 'block';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
            } else {
                alertBox.className = 'auth-alert error';
                alertBox.textContent = data.message;
                alertBox.style.display = 'block';
            }
        });
    </script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v833ccba57c9e4d2798f2e76cebdd09a11778172276447" integrity="sha512-57MDmcccJXYtNnH+ZiBwzC4jb2rvgVCEokYN+L/nLlmO8rfYT/gIpW2A569iJ/3b+0UEasghjuZH/ma3wIs/EQ==" data-cf-beacon='{"version":"2024.11.0","token":"7f7b0fd8732c4326aae4b9d58d5c514a","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
